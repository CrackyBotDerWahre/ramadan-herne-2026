<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Kalender 2026 - Herne</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1 id="city-name">HERNE</h1>
            <p id="current-date">Lade Datum...</p>
            <div class="hijri-badge" id="hijri-date">Ramadan 1447</div>
        </header>

        <main>
            <div class="main-timer">
                <span class="label" id="timer-label">NÄCHSTE ZEIT</span>
                <span class="time" id="next-prayer-time">--:--</span>
                <span class="countdown" id="countdown">--:--:--</span>
            </div>

            <div class="prayer-grid" id="prayer-grid">
                <!-- Prayer times will be injected here -->
            </div>
        </main>

        <footer>
            <p>AlphaClaw MedAssist Engine</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
